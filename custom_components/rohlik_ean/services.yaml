add_by_ean:
  name: Add by EAN
  description: >-
    Resolve an EAN/barcode to a Rohlík.cz product and add it to the cart.
    Fires rohlik_ean_matched or rohlik_ean_unresolved.
  fields:
    ean:
      name: EAN
      description: Barcode digits (EAN-8 to GTIN-14)
      required: true
      example: "8594001170012"
      selector:
        text:
    quantity:
      name: Quantity
      description: How many units to add
      default: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    dry_run:
      name: Dry run
      description: Only resolve the product, do not touch the cart
      default: false
      selector:
        boolean:

confirm_match:
  name: Confirm match
  description: >-
    Teach the integration an EAN → product mapping (stores it in the cache).
    Teaching never touches the cart unless you explicitly pass quantity > 0.
  fields:
    ean:
      name: EAN
      required: true
      example: "8594001170012"
      selector:
        text:
    product_id:
      name: Product ID
      description: Rohlík.cz product ID
      required: true
      example: 711263
      selector:
        number:
          min: 1
          mode: box
    quantity:
      name: Quantity
      description: Units to add to the cart (0 = only remember the mapping)
      default: 0
      selector:
        number:
          min: 0
          max: 50
          mode: box
    name:
      name: Product name
      description: Optional label stored with the mapping
      selector:
        text:

search_by_name:
  name: Search by name
  description: >-
    Search Rohlík.cz by a manually entered product name and offer the
    results as candidates for a pending scan (useful for private-label
    products missing in OpenFoodFacts). Without an EAN it targets the
    current pending scan.
  fields:
    name:
      name: Product name
      description: Name to search on Rohlík.cz
      required: true
      example: "Miil Tvaroh odtučněný"
      selector:
        text:
    ean:
      name: EAN
      description: Scan to attach the candidates to (default = current pending)
      example: "8594001170012"
      selector:
        text:
    quantity:
      name: Quantity
      description: Override the quantity used when the match is confirmed
      selector:
        number:
          min: 1
          max: 50
          mode: box

forget_ean:
  name: Forget EAN
  description: Remove a learned EAN → product mapping from the cache.
  fields:
    ean:
      name: EAN
      required: true
      example: "8594001170012"
      selector:
        text:

get_queue:
  name: Get queue
  description: Return all scans waiting for confirmation (used by the teaching panel).

get_mappings:
  name: Get mappings
  description: Return all learned EAN → product mappings (used by the teaching panel).

forget_eans:
  name: Forget EANs (bulk)
  description: Remove a batch of learned EAN → product mappings from the cache.
  fields:
    eans:
      name: EANs
      description: List of EANs to remove
      required: true
      example: '["8594001170012", "8594003964435"]'
      selector:
        object:

search_products:
  name: Search products
  description: >-
    Plain Rohlík.cz product search returning candidates. Does not touch the
    pending queue (used by the teaching panel's edit flow).
  fields:
    name:
      name: Product name
      required: true
      example: "Miil Tvaroh odtučněný"
      selector:
        text:

get_product_images:
  name: Get product images
  description: >-
    Resolve product IDs to image URLs via Rohlík's public product endpoint
    (cached; used by the teaching panel).
  fields:
    product_ids:
      name: Product IDs
      required: true
      example: "[711263, 1462148]"
      selector:
        object:

discard_scan:
  name: Discard scan
  description: Drop a pending scan without learning anything.
  fields:
    ean:
      name: EAN
      description: Scan to drop (default = the oldest one)
      example: "8594001170012"
      selector:
        text:
