# Actionable notifikace do mobilu, když integrace neví jistě.
#
# Tlačítka akcí mají v Androidu místo jen na ~20 znaků, proto nesou jen
# číslo + gramáž ("1 · 500 g"); plné názvy kandidátů včetně ceny jsou
# v těle notifikace (na Androidu se zobrazí po rozbalení šipkou).
# Tap na tlačítko = potvrzení + přidání do košíku + uložení do cache
# (příště už se integrace nebude ptát).
#
# Nahraď `notify.mobile_app_XXX` svojí notify službou.

automation:
  - alias: "Rohlík EAN: výběr kandidáta"
    mode: parallel
    trigger:
      - platform: event
        event_type: rohlik_ean_unresolved
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.candidates | count > 0 }}"
    action:
      - service: notify.mobile_app_XXX
        data:
          title: >-
            {% if trigger.event.data.metadata %}
            Rohlík: {{ trigger.event.data.metadata.brand }} {{ trigger.event.data.metadata.name }}?
            {% else %}
            Rohlík: EAN {{ trigger.event.data.ean }}
            {% endif %}
          message: >-
            {% for c in trigger.event.data.candidates[:3] -%}
            {{ loop.index }}) {{ c.name }} ({{ c.amount or '?' }}) – {{ c.price or '?' }}
            {% endfor %}
          data:
            # Android: zobrazí celé tělo notifikace po rozbalení
            styles:
              bigText: true
            # Tap na notifikaci otevře dashboard s potvrzovací kartou
            # (viz examples/confirm_card.yaml) — uprav cestu na svůj view.
            clickAction: /lovelace/rohlik
            actions: >-
              {% set ns = namespace(actions=[]) %}
              {% for c in trigger.event.data.candidates[:3] %}
              {% set ns.actions = ns.actions + [{
                "action": "ROHLIK_EAN_" ~ trigger.event.data.ean ~ "_" ~ c.id ~ "_" ~ trigger.event.data.quantity,
                "title": loop.index ~ " · " ~ (c.amount or (c.price or "?"))
              }] %}
              {% endfor %}
              {{ ns.actions }}

  # Kód se nenašel vůbec (žádní kandidáti) — jen informuj, ať sken
  # nezapadne; detail s návodem je v trvalé notifikaci v HA.
  - alias: "Rohlík EAN: nenalezeno"
    mode: parallel
    trigger:
      - platform: event
        event_type: rohlik_ean_unresolved
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.candidates | count == 0 }}"
    action:
      - service: notify.mobile_app_XXX
        data:
          title: "Rohlík: produkt nenalezen"
          message: >-
            {% if trigger.event.data.metadata %}
            {{ trigger.event.data.metadata.brand }} {{ trigger.event.data.metadata.name }}
            ({{ trigger.event.data.metadata.quantity or '?' }}) — Rohlík ho nejspíš nevede.
            {% else %}
            Neznámý kód {{ trigger.event.data.ean }} — přidej ručně.
            {% endif %}
          data:
            clickAction: /lovelace/rohlik

  - alias: "Rohlík EAN: potvrzení z notifikace"
    mode: parallel
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data: {}
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.action.startswith('ROHLIK_EAN_') }}"
    action:
      - variables:
          parts: "{{ trigger.event.data.action.split('_') }}"
      # quantity: 0 = jen naučit mapování, do košíku se nepřidává.
      # Nákup proběhne dalším skenem (už z cache). Chceš-li rovnou i koupit,
      # dej quantity: "{{ parts[4] | int(1) }}".
      - service: rohlik_ean.confirm_match
        data:
          ean: "{{ parts[2] }}"
          product_id: "{{ parts[3] | int }}"
          quantity: 0
