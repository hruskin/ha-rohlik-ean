# Fáze 2 — hardwarová čtečka (ESP32 + GM67 přes ESPHome).
# Čtečka vystřelí event `esphome.barcode_scan` s EANem (a při agregaci
# na zařízení i s `quantity` — viz examples/esphome_gm67.yaml); tahle
# automatizace ho jen předá integraci. Zapojení GM67 (UART) viz
# https://github.com/MattFryer/HA-Mealie-Barcode-Scanner

automation:
  - alias: "Rohlík EAN: sken ze čtečky"
    mode: queued
    trigger:
      - platform: event
        event_type: esphome.barcode_scan
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.barcode | regex_match('^\\d{8,14}$') }}"
    action:
      - service: rohlik_ean.add_by_ean
        data:
          ean: "{{ trigger.event.data.barcode }}"
          quantity: "{{ trigger.event.data.quantity | int(1) }}"
