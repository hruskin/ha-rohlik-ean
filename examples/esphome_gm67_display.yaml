# Fáze 2 — čtečka ESP32-C3 + GM67 + SSD1306 displej + dotykové tlačítko (TTP223)
#
#  - GM67 se ovládá PŘES UART (žádný MOSFET): na startu se přepne do
#    kontinuálního režimu a vypne; dotyk TTP223 ho zapne na ${active_window}
#    a pak zase vypne. Využívá TX linku (GPIO7 → RX čtečky), co už vede.
#  - SSD1306 128x64 I2C ukazuje stav + poslední produkt z HA.
#
# Příkazy dle manuálu GM67 (Hangzhou Grow, V1.1) — Appendix 6, Table 6-1/6-2:
#   Continuous mode 07 C6 04 08 00 8A 04 FE 99  (čte kód za kódem, nezhasne)
#   Break time 0s   07 C6 04 08 00 89 00 FE 9E
#   Single scan 20s 08 C6 04 08 00 F2 FA 0C FD 2E
#   SCAN_ENABLE     04 E9 04 00 FF 0F
#   SCAN_DISABLE    04 EA 04 00 FF 0E
# Proč ne host mode: v něm se čtení po každém dekódu ukončí (nutný re-arm
# a čtečka mezi kusy zhasíná). START/STOP_DECODE vyžadují host mode,
# SCAN_ENABLE/DISABLE ne — proto tahle kombinace.
#
# POČET KUSŮ opakovaným skenem řídí „Time Interval For The Same Code Read"
# (manuál 4.6.1, default 500 ms): tentýž kód se přečte nejvýš jednou za tuto
# dobu. Když ti drženýkód počítá moc rychle, nastav delší (1s/3s) setup
# kódem z manuálu.
#
# !!! PŘED FLASHEM ZKONTROLUJ !!!
#  - model/adresa displeje (128x64 / 0x3C)
#  - piny (GPIO6/7 UART a GPIO8 LED jsou pevně obsazené)
#  - TTP223 v momentovém režimu (výstup HIGH při dotyku) — default z výroby

substitutions:
  device_name: "rohlik-ctecka"
  friendly_name: "Rohlík Čtečka EAN"
  rx_pin: "GPIO6"          # TX čtečky GM67
  tx_pin: "GPIO7"          # RX čtečky GM67
  i2c_sda: "GPIO4"
  i2c_scl: "GPIO5"
  touch_pin: "GPIO3"       # TTP223 OUT
  aggregation_window: "3s"
  active_window: "20s"     # jak dlouho po dotyku čtečka svítí/skenuje

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - delay: 2s            # počkej, až se GM67 nastartuje
      # CONTINUOUS MODE — po přečtení kódu se čtení samo znovu spustí,
      # takže čtečka mezi kusy nezhasne (manuál 4.2). Host mode by po
      # každém dekódu zhasl a musel se re-armovat.
      - uart.write:
          id: scanner_uart
          data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x04, 0xFE, 0x99]
      # Break time 0 s — bez prodlevy mezi jednotlivými čteními
      - uart.write:
          id: scanner_uart
          data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x89, 0x00, 0xFE, 0x9E]
      # Single scan time 20 s = HW pojistka: i kdyby ESP umřelo,
      # čtečka sama zhasne. Drž stejně jako ${active_window}.
      - uart.write:
          id: scanner_uart
          data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xFA, 0x0C, 0xFD, 0x2E]
      # SCAN_DISABLE → po startu tma
      - uart.write:
          id: scanner_uart
          data: [0x04, 0xEA, 0x04, 0x00, 0xFF, 0x0E]

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO

api:
  encryption:
    key: !secret key
  # HA volá tyto akce pro zpětnou vazbu. title/subtitle se zobrazí na OLED.
  actions:
    - action: scan_success
      variables:
        title: string
        subtitle: string
      then:
        - lambda: 'id(disp_title) = title; id(disp_sub) = subtitle;'
        - component.update: oled
        - script.execute: blink_success
    - action: scan_unknown
      variables:
        title: string
        subtitle: string
      then:
        - lambda: 'id(disp_title) = title; id(disp_sub) = subtitle;'
        - component.update: oled
        - script.execute: blink_unknown
    - action: scan_failed
      variables:
        title: string
        subtitle: string
      then:
        - lambda: 'id(disp_title) = title; id(disp_sub) = subtitle;'
        - component.update: oled
        - script.execute: blink_failed

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  post_connect_roaming: false
  ap:
    ssid: "Rohlik-Ctecka Fallback"
    password: !secret ap_password

captive_portal:

i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  frequency: 400kHz

uart:
  id: scanner_uart
  rx_pin: ${rx_pin}
  tx_pin: ${tx_pin}
  baud_rate: 9600
  rx_buffer_size: 256
  debug:
    direction: RX
    dummy_receiver: true
    after:
      delimiter: [0x0D]   # GM67 ukončuje kód znakem CR
    sequence:
      - lambda: |-
          std::string barcode(bytes.begin(), bytes.end());
          barcode.erase(std::remove(barcode.begin(), barcode.end(), '\r'), barcode.end());
          barcode.erase(std::remove(barcode.begin(), barcode.end(), '\n'), barcode.end());
          barcode.erase(std::remove(barcode.begin(), barcode.end(), ' '), barcode.end());
          bool only_digits = !barcode.empty() &&
              std::all_of(barcode.begin(), barcode.end(),
                          [](unsigned char c){ return std::isdigit(c); });
          if (barcode.length() >= 8 && barcode.length() <= 14 && only_digits) {
            id(scanned_barcode).publish_state(barcode);
          } else {
            ESP_LOGW("scanner", "Ignorován neplatný kód: %s", barcode.c_str());
          }

globals:
  - id: last_code
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: scan_count
    type: int
    restore_value: false
    initial_value: '0'
  - id: scanning
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: disp_title
    type: std::string
    restore_value: false
    initial_value: '"Rohlík EAN"'
  - id: disp_sub
    type: std::string
    restore_value: false
    initial_value: '"Přilož prst"'

# Dotykové tlačítko TTP223 — probudí čtečku
binary_sensor:
  - platform: gpio
    pin:
      number: ${touch_pin}
      mode: INPUT
    name: "Aktivační dotyk"
    id: touch_btn
    filters:
      - delayed_on: 20ms
    on_press:
      - script.execute: activate_scanner

button:
  # Totéž co dotyk, ale z Home Assistantu (dashboard, automatizace, Assist)
  - platform: template
    name: "Aktivovat čtečku"
    id: activate_btn
    icon: "mdi:barcode-scan"
    on_press:
      - script.execute: activate_scanner

  # Ruční vypnutí ještě před uplynutím okna
  - platform: template
    name: "Vypnout čtečku"
    id: deactivate_btn
    icon: "mdi:barcode-off"
    on_press:
      - script.stop: activate_scanner
      - script.stop: scanner_timeout
      - uart.write:                     # STOP_DECODE
          id: scanner_uart
          data: [0x04, 0xE5, 0x04, 0x00, 0xFF, 0x13]
      - lambda: |-
          id(scanning) = false;
          id(disp_title) = "Rohlík EAN";
          id(disp_sub) = "Přilož prst";
      - component.update: oled

font:
  - file: "gfonts://Roboto"
    id: font_big
    size: 16
    glyphs: " !\"%()+,-./0123456789:;?ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÁČĎÉĚÍŇÓŘŠŤÚŮÝŽáčďéěíňóřšťúůýž"
  - file: "gfonts://Roboto"
    id: font_small
    size: 12
    glyphs: " !\"%()+,-./0123456789:;?ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyzÁČĎÉĚÍŇÓŘŠŤÚŮÝŽáčďéěíňóřšťúůýž"

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    update_interval: 500ms
    lambda: |-
      // Text řídí globály; tečka vpravo nahoře značí, že čtečka je živá.
      it.printf(0, 0, id(font_big), "%s", id(disp_title).c_str());
      it.printf(0, 34, id(font_small), "%s", id(disp_sub).c_str());
      if (id(scanning)) it.filled_circle(123, 4, 3);

light:
  - platform: status_led
    name: "Indikační LED"
    id: device_status_led
    pin:
      number: GPIO8
      inverted: true

script:
  # Vstupní bod (dotyk / tlačítko v HA): zapne čtečku a nastartuje odpočet.
  - id: activate_scanner
    mode: restart
    then:
      - lambda: |-
          id(disp_title) = "Skenuji…";
          id(disp_sub) = "Přilož kód";
      - script.execute: scanner_on
      - script.execute: scanner_timeout
      - component.update: oled

  - id: scanner_on
    mode: single
    then:
      - lambda: 'id(scanning) = true;'
      - uart.write:                     # probuď ze spánku (libovolný bajt)
          id: scanner_uart
          data: [0x00]
      - delay: 60ms
      - uart.write:                     # SCAN_ENABLE — čtečka žije a čte dokola
          id: scanner_uart
          data: [0x04, 0xE9, 0x04, 0x00, 0xFF, 0x0F]

  # Odpočet do zhasnutí. mode: restart → každý úspěšný sken ho posune,
  # takže při skenování víc kusů nemusíš znovu sahat na tlačítko.
  - id: scanner_timeout
    mode: restart
    then:
      - delay: ${active_window}
      - uart.write:                     # SCAN_DISABLE — zhasni
          id: scanner_uart
          data: [0x04, 0xEA, 0x04, 0x00, 0xFF, 0x0E]
      - lambda: |-
          id(scanning) = false;
          id(disp_title) = "Rohlík EAN";
          id(disp_sub) = "Přilož prst";
      - component.update: oled

  # Agregace opakovaných skenů → jeden event barcode + quantity
  - id: flush_scan
    mode: restart
    then:
      - delay: ${aggregation_window}
      - if:
          condition:
            lambda: "return !id(last_code).empty();"
          then:
            - homeassistant.event:
                event: esphome.barcode_scan
                data:
                  barcode: !lambda "return id(last_code);"
                  quantity: !lambda "return to_string(id(scan_count));"
            - lambda: |-
                id(last_code) = "";
                id(scan_count) = 0;

  - id: blink_success
    mode: restart
    then:
      - light.turn_on: device_status_led
      - delay: 600ms
      - light.turn_off: device_status_led
  - id: blink_unknown
    mode: restart
    then:
      - repeat:
          count: 2
          then:
            - light.turn_on: device_status_led
            - delay: 150ms
            - light.turn_off: device_status_led
            - delay: 150ms
  - id: blink_failed
    mode: restart
    then:
      - repeat:
          count: 4
          then:
            - light.turn_on: device_status_led
            - delay: 80ms
            - light.turn_off: device_status_led
            - delay: 80ms

text_sensor:
  - platform: template
    name: "Naskenovaný EAN"
    id: scanned_barcode
    icon: "mdi:barcode-scan"
    on_value:
      then:
        # Continuous mode se re-triggeruje sám → žádný re-arm netřeba.
        # Každý úspěšný sken jen posune okno; pípáš dál bez dotyku.
        - script.execute: scanner_timeout
        - lambda: |-
            id(disp_title) = "Načteno";
            id(disp_sub) = x;
        - component.update: oled
        - if:
            condition:
              lambda: "return !id(last_code).empty() && id(last_code) != x;"
            then:
              - homeassistant.event:
                  event: esphome.barcode_scan
                  data:
                    barcode: !lambda "return id(last_code);"
                    quantity: !lambda "return to_string(id(scan_count));"
              - lambda: |-
                  id(last_code) = x;
                  id(scan_count) = 1;
            else:
              - lambda: |-
                  if (id(last_code) == x) id(scan_count) += 1;
                  else { id(last_code) = x; id(scan_count) = 1; }
        - script.execute: flush_scan
